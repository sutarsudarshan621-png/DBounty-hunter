version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dbounty
      POSTGRES_PASSWORD: dbounty
      POSTGRES_DB: dbounty
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  backend:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.backend
    env_file: .env
    depends_on: [postgres, redis]
    ports: ["8080:8080"]

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    ports: ["5173:80"]
    depends_on: [backend]

volumes:
  pgdata:
